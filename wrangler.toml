name = "pulsechat"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[assets]
directory = "./frontend/dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

[dev]
port = 8787
